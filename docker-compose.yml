version: '3.8'

services:
  qwenproxy:
    build: .
    expose:
      - "3000"
    environment:
      - PORT=${PORT:-3000}
      - API_KEY=${API_KEY:-sua_api_key_aqui}
      - QWEN_EMAIL=${QWEN_EMAIL:-}
      - QWEN_PASSWORD=${QWEN_PASSWORD:-}
    volumes:
      - ./qwen_profile:/app/qwen_profile
    networks:
      coolify:
        aliases:
          - qwenproxy
    restart: unless-stopped

networks:
  coolify:
    external: true
    name: ${COOLIFY_NETWORK:-coolify}
